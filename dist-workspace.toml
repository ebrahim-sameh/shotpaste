[workspace]
members = ["cargo:."]

# Config for 'dist'
[dist]
# The preferred dist version to use in CI (Cargo.toml SemVer syntax)
cargo-dist-version = "0.31.0"
# CI backends to support
ci = "github"
# The installers to generate for each app
installers = ["shell", "powershell"]
# Target platforms to build apps for (Rust target-triple syntax).
# aarch64-pc-windows-msvc deferred to v0.2 — cargo-dist 0.31 invokes its
# cross-compile apt step without `-y`, which prompts for Y/n in the
# Debian trixie container and breaks the run.
targets = [
    "aarch64-apple-darwin",
    "aarch64-unknown-linux-gnu",
    "x86_64-apple-darwin",
    "x86_64-pc-windows-msvc",
    "x86_64-unknown-linux-gnu",
]

# Linux build needs X11 / Wayland headers for clipboard-rs's x11rb +
# wl-clipboard-rs deps, plus gtk3 + ayatana-appindicator for tray-icon's
# StatusNotifierItem host on Linux. dist installs these via apt before
# `cargo build`.
[dist.dependencies.apt]
libxcb1-dev = "*"
libxcb-render0-dev = "*"
libxcb-shape0-dev = "*"
libxcb-xfixes0-dev = "*"
libwayland-dev = "*"
libgtk-3-dev = "*"
libayatana-appindicator3-dev = "*"
